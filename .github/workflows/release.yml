name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - uses: actions/cache@v5
        with:
          path: /tmp/openssl-musl
          key: openssl-4.0.1-musl-v2
      - name: Build OpenSSL 4.0 for musl
        run: |
          if [ -f /tmp/openssl-musl/include/openssl/ech.h ]; then
            echo "Using cached OpenSSL musl build"
            exit 0
          fi
          curl -sSL https://github.com/openssl/openssl/releases/download/openssl-4.0.1/openssl-4.0.1.tar.gz | tar xz
          cd openssl-4.0.1
          CC=musl-gcc ./Configure linux-x86_64 --prefix=/tmp/openssl-musl \
            no-shared no-async no-ui-console no-secure-memory \
            -DOPENSSL_NO_ASYNC
          make -j$(nproc)
          make install_sw
      - name: Build (musl static)
        run: |
          export OPENSSL_DIR=/tmp/openssl-musl
          export OPENSSL_INCLUDE_DIR=/tmp/openssl-musl/include
          export OPENSSL_LIB_DIR=/tmp/openssl-musl/lib64
          export OPENSSL_STATIC=1
          export CC_x86_64_unknown_linux_musl=musl-gcc
          export CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc
          cargo build --release --target x86_64-unknown-linux-musl
      - name: Package
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-musl/release/bangumi-proxy dist/
          tar czf "bangumi-proxy-${GITHUB_REF_NAME}-linux-x86_64.tar.gz" -C dist .
      - uses: actions/upload-artifact@v6
        with:
          name: linux-x86_64
          path: bangumi-proxy-*-linux-x86_64.tar.gz

  build-macos-x86_64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - uses: actions/cache@v5
        with:
          path: ~/.conan2
          key: conan-openssl-4.0.1-macos-x86_64-v3
      - run: pipx install conan
      - name: Install OpenSSL 4.0 via Conan
        run: |
          conan profile detect --force
          mkdir -p conan
          printf '[requires]\nopenssl/4.0.1\n[generators]\nPkgConfigDeps\nVirtualBuildEnv\nVirtualRunEnv\n' > conan/conanfile.txt
          conan install conan --build=missing -s build_type=Release -s arch=x86_64
      - name: Build (x86_64)
        run: |
          CONAN_PKG=$(find ~/.conan2/p -path "*/p/include/openssl/ech.h" 2>/dev/null | head -1 | sed 's|/include/openssl/ech.h||')
          echo "CONAN_PKG=$CONAN_PKG"
          export OPENSSL_DIR=$CONAN_PKG
          export OPENSSL_INCLUDE_DIR=$CONAN_PKG/include
          LIB_DIR=$(ls -d $CONAN_PKG/lib* 2>/dev/null | head -1)
          export OPENSSL_LIB_DIR=${LIB_DIR:-$CONAN_PKG/lib}
          export OPENSSL_STATIC=1
          export CARGO_TARGET_X86_64_APPLE_DARWIN_LINKER=clang
          export CARGO_TARGET_X86_64_APPLE_DARWIN_RUSTFLAGS="-C link-arg=-arch -C link-arg=x86_64"
          cargo build --release --target x86_64-apple-darwin
      - name: Package
        run: |
          mkdir -p dist
          cp target/x86_64-apple-darwin/release/bangumi-proxy dist/
          tar czf "bangumi-proxy-${GITHUB_REF_NAME}-macos-x86_64.tar.gz" -C dist .
      - uses: actions/upload-artifact@v6
        with:
          name: macos-x86_64
          path: bangumi-proxy-*-macos-x86_64.tar.gz

  build-macos-aarch64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: ~/.conan2
          key: conan-openssl-4.0.1-macos-aarch64-v1
      - run: pipx install conan
      - name: Install OpenSSL 4.0 via Conan
        run: |
          conan profile detect --force
          mkdir -p conan
          printf '[requires]\nopenssl/4.0.1\n[generators]\nPkgConfigDeps\nVirtualBuildEnv\nVirtualRunEnv\n' > conan/conanfile.txt
          conan install conan --build=missing -s build_type=Release
      - name: Build (aarch64)
        run: |
          CONAN_PKG=$(find ~/.conan2/p -path "*/p/include/openssl/ech.h" 2>/dev/null | head -1 | sed 's|/include/openssl/ech.h||')
          echo "CONAN_PKG=$CONAN_PKG"
          export OPENSSL_DIR=$CONAN_PKG
          export OPENSSL_INCLUDE_DIR=$CONAN_PKG/include
          LIB_DIR=$(ls -d $CONAN_PKG/lib* 2>/dev/null | head -1)
          export OPENSSL_LIB_DIR=${LIB_DIR:-$CONAN_PKG/lib}
          export OPENSSL_STATIC=1
          cargo build --release
      - name: Package
        run: |
          mkdir -p dist
          cp target/release/bangumi-proxy dist/
          tar czf "bangumi-proxy-${GITHUB_REF_NAME}-macos-aarch64.tar.gz" -C dist .
      - uses: actions/upload-artifact@v6
        with:
          name: macos-aarch64
          path: bangumi-proxy-*-macos-aarch64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: ~/.conan2
          key: conan-openssl-4.0.1-windows-v1
      - run: pip install conan
      - name: Install OpenSSL 4.0 via Conan
        shell: pwsh
        run: |
          conan profile detect --force
          mkdir conan -Force
          "[requires]`nopenssl/4.0.1`n[generators]`nPkgConfigDeps`nVirtualBuildEnv`nVirtualRunEnv" | Set-Content -Path "conan\conanfile.txt"
          cd conan; conan install . --build=missing -s build_type=Release -s compiler.runtime=static
      - name: Build
        shell: pwsh
        run: |
          # Find the Conan package directory (p\<hash>\p\lib\libssl.lib)
          $libFile = Get-ChildItem -Path "$env:USERPROFILE\.conan2\p" -Recurse -Filter "libssl.lib" -ErrorAction SilentlyContinue | Where-Object { $_.FullName -match "\\p\\lib\\" } | Select-Object -First 1
          $CONAN_PKG = $libFile.Directory.Parent.FullName
          echo "CONAN_PKG=$CONAN_PKG"
          $env:OPENSSL_DIR = $CONAN_PKG
          $env:OPENSSL_INCLUDE_DIR = "$CONAN_PKG\include"
          $env:OPENSSL_LIB_DIR = $libFile.DirectoryName
          $env:OPENSSL_STATIC = "1"
          $env:CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_RUSTFLAGS = "-C target-feature=+crt-static"
          cargo build --release
      - name: Package
        shell: pwsh
        run: |
          mkdir dist -Force
          Copy-Item target\release\bangumi-proxy.exe dist\
          Compress-Archive -Path dist\* -DestinationPath "bangumi-proxy-${env:GITHUB_REF_NAME}-windows-x86_64.zip"
      - uses: actions/upload-artifact@v6
        with:
          name: windows-x86_64
          path: bangumi-proxy-*-windows-x86_64.zip

  release:
    needs: [build-linux, build-macos-x86_64, build-macos-aarch64, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*
          generate_release_notes: true
