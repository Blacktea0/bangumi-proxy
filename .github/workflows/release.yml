name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Conan
        run: pip install conan

      - name: Install OpenSSL 4.0 via Conan
        run: |
          conan profile detect
          mkdir -p conan
          cat > conan/conanfile.txt << 'EOF'
          [requires]
          openssl/4.0.1
          [generators]
          PkgConfigDeps
          VirtualBuildEnv
          VirtualRunEnv
          EOF
          cd conan && conan install . --build=missing -s build_type=Release

      - name: Build bangumi-proxy
        run: |
          CONAN_BASE=$(find ~/.conan2/p -path "*/openssl/4.0.1" -type d 2>/dev/null | head -1)
          if [ -z "$CONAN_BASE" ]; then
            CONAN_BASE=$(find conan -name "openssl" -type d 2>/dev/null | head -1)
          fi
          echo "CONAN_BASE=$CONAN_BASE"
          export OPENSSL_DIR=$CONAN_BASE
          export OPENSSL_INCLUDE_DIR=$(find $CONAN_BASE -name "ech.h" -path "*/openssl/*" -exec dirname {} \; 2>/dev/null | head -1 | sed 's|/openssl||')
          if [ -z "$OPENSSL_INCLUDE_DIR" ]; then
            export OPENSSL_INCLUDE_DIR=$(find $CONAN_BASE -name "ssl.h" -path "*/openssl/*" -exec dirname {} \; 2>/dev/null | head -1 | sed 's|/openssl||')
          fi
          export OPENSSL_LIB_DIR=$(find $CONAN_BASE -name "libssl.so*" -exec dirname {} \; 2>/dev/null | head -1)
          echo "OPENSSL_INCLUDE_DIR=$OPENSSL_INCLUDE_DIR"
          echo "OPENSSL_LIB_DIR=$OPENSSL_LIB_DIR"
          ls "$OPENSSL_INCLUDE_DIR/openssl/ech.h" 2>/dev/null && echo "✓ ech.h found" || echo "✗ ech.h NOT found"
          cargo build --release

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/bangumi-proxy dist/
          cp ca.pem ca-key.pem dist/
          CONAN_BASE=$(find ~/.conan2/p -path "*/openssl/4.0.1" -type d 2>/dev/null | head -1)
          LIB_DIR=$(find $CONAN_BASE -name "libssl.so*" -exec dirname {} \; 2>/dev/null | head -1)
          cp $LIB_DIR/libssl.so.4 dist/ 2>/dev/null || true
          cp $LIB_DIR/libcrypto.so.3 dist/ 2>/dev/null || true
          tar czf "bangumi-proxy-${GITHUB_REF_NAME}-linux-x86_64.tar.gz" -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: bangumi-proxy-*-linux-x86_64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Conan
        run: pip install conan

      - name: Install OpenSSL 4.0 via Conan
        shell: pwsh
        run: |
          conan profile detect
          mkdir conan -Force
          Set-Content -Path "conan\conanfile.txt" -Value @"
          [requires]
          openssl/4.0.1
          [generators]
          PkgConfigDeps
          VirtualBuildEnv
          VirtualRunEnv
          "@
          cd conan; conan install . --build=missing -s build_type=Release

      - name: Build bangumi-proxy
        shell: pwsh
        run: |
          $conanBase = Get-ChildItem -Path "$env:USERPROFILE\.conan2\p" -Recurse -Directory -Filter "openssl" -ErrorAction SilentlyContinue | Where-Object { Test-Path "$($_.FullName)\include" } | Select-Object -First 1
          if (-not $conanBase) {
            $conanBase = Get-ChildItem -Path conan -Recurse -Directory -Filter "openssl" -ErrorAction SilentlyContinue | Where-Object { Test-Path "$($_.FullName)\include" } | Select-Object -First 1
          }
          $env:OPENSSL_DIR = $conanBase.FullName
          $env:OPENSSL_INCLUDE_DIR = "$($conanBase.FullName)\include"
          $sslLib = Get-ChildItem -Path $conanBase.FullName -Recurse -Filter "libssl.lib" -ErrorAction SilentlyContinue | Select-Object -First 1
          $env:OPENSSL_LIB_DIR = $sslLib.DirectoryName
          echo "OPENSSL_DIR=$env:OPENSSL_DIR"
          echo "OPENSSL_INCLUDE_DIR=$env:OPENSSL_INCLUDE_DIR"
          echo "OPENSSL_LIB_DIR=$env:OPENSSL_LIB_DIR"
          cargo build --release

      - name: Package
        shell: pwsh
        run: |
          mkdir dist -Force
          Copy-Item target\release\bangumi-proxy.exe dist\
          Copy-Item ca.pem, ca-key.pem dist\
          $conanBase = Get-ChildItem -Path "$env:USERPROFILE\.conan2\p" -Recurse -Directory -Filter "openssl" -ErrorAction SilentlyContinue | Where-Object { Test-Path "$($_.FullName)\include" } | Select-Object -First 1
          if (-not $conanBase) { $conanBase = Get-ChildItem -Path conan -Recurse -Directory -Filter "openssl" | Where-Object { Test-Path "$($_.FullName)\include" } | Select-Object -First 1 }
          $binDir = Get-ChildItem -Path $conanBase.FullName -Recurse -Filter "libssl*.dll" -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty DirectoryName
          if ($binDir) { Copy-Item "$binDir\*.dll" dist\ }
          Compress-Archive -Path dist\* -DestinationPath "bangumi-proxy-${env:GITHUB_REF_NAME}-windows-x86_64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: bangumi-proxy-*-windows-x86_64.zip

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
