name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache OpenSSL
        id: cache-openssl
        uses: actions/cache@v4
        with:
          path: /opt/openssl-4.0
          key: openssl-4.0.1-linux-x64-v2

      - name: Build OpenSSL 4.0 from source
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        run: |
          curl -sL "https://github.com/openssl/openssl/releases/download/openssl-4.0.1/openssl-4.0.1.tar.gz" | tar xz -C /tmp
          cd /tmp/openssl-4.0.1
          ./config --prefix=/opt/openssl-4.0 --openssldir=/opt/openssl-4.0/ssl shared
          make -j$(nproc)
          sudo make install_sw

      - name: Build bangumi-proxy
        run: |
          export OPENSSL_DIR=/opt/openssl-4.0
          export OPENSSL_LIB_DIR=/opt/openssl-4.0/lib64
          export OPENSSL_INCLUDE_DIR=/opt/openssl-4.0/include
          cargo build --release

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/bangumi-proxy dist/
          cp ca.pem ca-key.pem dist/
          # Bundle OpenSSL 4.0 shared libs
          cp /opt/openssl-4.0/lib64/libssl.so.4 dist/ 2>/dev/null || true
          cp /opt/openssl-4.0/lib64/libcrypto.so.3 dist/ 2>/dev/null || true
          tar czf "bangumi-proxy-${GITHUB_REF_NAME}-linux-x86_64.tar.gz" -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: bangumi-proxy-*-linux-x86_64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache OpenSSL
        id: cache-openssl
        uses: actions/cache@v4
        with:
          path: C:\openssl-4.0
          key: openssl-4.0.1-windows-firedaemon-v2

      - name: Download FireDaemon OpenSSL 4.0 ZIP
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://www.firedaemon.com/download-firedaemon-openssl-4-0-zip" -OutFile "openssl-fd.zip"
          Expand-Archive -Path "openssl-fd.zip" -DestinationPath "openssl-fd"
          # Find the x64 directory and copy to C:\openssl-4.0
          $x64 = Get-ChildItem -Path "openssl-fd" -Recurse -Directory | Where-Object { $_.Name -eq "x64" } | Select-Object -First 1
          Copy-Item -Path $x64.FullName -Destination "C:\openssl-4.0" -Recurse
          # Copy ssl dir if present
          $ssl = Get-ChildItem -Path "openssl-fd" -Recurse -Directory | Where-Object { $_.Name -eq "ssl" } | Select-Object -First 1
          if ($ssl) { Copy-Item -Path $ssl.FullName -Destination "C:\openssl-4.0\ssl" -Recurse }
          Get-ChildItem "C:\openssl-4.0" -Recurse -Name | Select-Object -First 30

      - name: Build bangumi-proxy
        shell: pwsh
        run: |
          $env:OPENSSL_DIR = "C:\openssl-4.0"
          $env:OPENSSL_LIB_DIR = "C:\openssl-4.0\lib"
          $env:OPENSSL_INCLUDE_DIR = "C:\openssl-4.0\include"
          cargo build --release

      - name: Package
        shell: pwsh
        run: |
          mkdir dist
          Copy-Item target\release\bangumi-proxy.exe dist\
          Copy-Item ca.pem, ca-key.pem dist\
          # Bundle OpenSSL DLLs
          Copy-Item C:\openssl-4.0\bin\libssl-4-x64.dll dist\ -ErrorAction SilentlyContinue
          Copy-Item C:\openssl-4.0\bin\libcrypto-3-x64.dll dist\ -ErrorAction SilentlyContinue
          Copy-Item C:\openssl-4.0\bin\libcrypto-4-x64.dll dist\ -ErrorAction SilentlyContinue
          Compress-Archive -Path dist\* -DestinationPath "bangumi-proxy-${env:GITHUB_REF_NAME}-windows-x86_64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: bangumi-proxy-*-windows-x86_64.zip

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
