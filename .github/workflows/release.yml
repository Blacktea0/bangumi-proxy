name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-openssl-4.0.1-linux-v1
      - run: pip install conan
      - name: Install OpenSSL 4.0 via Conan
        run: |
          conan profile detect --force
          mkdir -p conan
          cat > conan/conanfile.txt << 'EOF'
          [requires]
          openssl/4.0.1
          [generators]
          PkgConfigDeps
          VirtualBuildEnv
          VirtualRunEnv
          EOF
          cd conan && conan install . --build=missing -s build_type=Release
      - name: Build
        run: |
          CONAN_PKG=$(find ~/.conan2/p -path "*/p/include/openssl/ech.h" 2>/dev/null | head -1 | sed 's|/include/openssl/ech.h||')
          echo "CONAN_PKG=$CONAN_PKG"
          export OPENSSL_DIR=$CONAN_PKG
          export OPENSSL_INCLUDE_DIR=$CONAN_PKG/include
          export OPENSSL_LIB_DIR=$CONAN_PKG/lib
          export OPENSSL_STATIC=1
          cargo build --release
      - name: Package
        run: |
          mkdir -p dist
          cp target/release/bangumi-proxy dist/
          cp ca.pem ca-key.pem dist/
          tar czf "bangumi-proxy-${GITHUB_REF_NAME}-linux-x86_64.tar.gz" -C dist .
      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: bangumi-proxy-*-linux-x86_64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-openssl-4.0.1-windows-v1
      - run: pip install conan
      - name: Install OpenSSL 4.0 via Conan
        shell: pwsh
        run: |
          conan profile detect --force
          mkdir conan -Force
          Set-Content -Path "conan\conanfile.txt" -Value @"
          [requires]
          openssl/4.0.1
          [generators]
          PkgConfigDeps
          VirtualBuildEnv
          VirtualRunEnv
          "@
          cd conan; conan install . --build=missing -s build_type=Release
      - name: Build
        shell: pwsh
        run: |
          # Find libssl.lib to locate the Conan package directory
          $libFile = Get-ChildItem -Path "$env:USERPROFILE\.conan2\p" -Recurse -Filter "libssl.lib" -ErrorAction SilentlyContinue | Select-Object -First 1
          $CONAN_PKG = $libFile.Directory.Parent.FullName
          echo "CONAN_PKG=$CONAN_PKG"
          $env:OPENSSL_DIR = $CONAN_PKG
          $env:OPENSSL_INCLUDE_DIR = "$CONAN_PKG\include"
          $env:OPENSSL_LIB_DIR = $libFile.DirectoryName
          $env:OPENSSL_STATIC = "1"
          cargo build --release
      - name: Package
        shell: pwsh
        run: |
          mkdir dist -Force
          Copy-Item target\release\bangumi-proxy.exe dist\
          Copy-Item ca.pem, ca-key.pem dist\
          Compress-Archive -Path dist\* -DestinationPath "bangumi-proxy-${env:GITHUB_REF_NAME}-windows-x86_64.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: bangumi-proxy-*-windows-x86_64.zip

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
