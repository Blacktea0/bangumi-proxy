name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Conan
        run: pip install conan

      - name: Install OpenSSL 4.0 via Conan
        run: |
          conan profile detect
          conan install --requires=openssl/4.0.1 -of=conan --build=missing -s build_type=Release

      - name: Build bangumi-proxy
        run: |
          OPENSSL_DIR=$(find conan -maxdepth 4 -name "openssl" -type d | head -1)
          export OPENSSL_DIR
          export OPENSSL_INCLUDE_DIR="$OPENSSL_DIR/include"
          export OPENSSL_LIB_DIR=$(find conan -path "*/lib/libssl.so" -exec dirname {} \; | head -1)
          echo "OPENSSL_DIR=$OPENSSL_DIR"
          echo "OPENSSL_INCLUDE_DIR=$OPENSSL_INCLUDE_DIR"
          echo "OPENSSL_LIB_DIR=$OPENSSL_LIB_DIR"
          ls "$OPENSSL_INCLUDE_DIR/openssl/ech.h" && echo "ech.h found!"
          cargo build --release

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/bangumi-proxy dist/
          cp ca.pem ca-key.pem dist/
          OPENSSL_LIB_DIR=$(find conan -path "*/lib/libssl.so" -exec dirname {} \; | head -1)
          cp "$OPENSSL_LIB_DIR/libssl.so.4" dist/ 2>/dev/null || true
          cp "$OPENSSL_LIB_DIR/libcrypto.so.3" dist/ 2>/dev/null || true
          tar czf "bangumi-proxy-${GITHUB_REF_NAME}-linux-x86_64.tar.gz" -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: bangumi-proxy-*-linux-x86_64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Conan
        run: pip install conan

      - name: Install OpenSSL 4.0 via Conan
        shell: pwsh
        run: |
          conan profile detect
          conan install --requires=openssl/4.0.1 -of=conan --build=missing -s build_type=Release

      - name: Build bangumi-proxy
        shell: pwsh
        run: |
          $opensslDir = Get-ChildItem -Path conan -Recurse -Directory -Filter "openssl" | Where-Object { Test-Path "$($_.FullName)\include" } | Select-Object -First 1
          $env:OPENSSL_DIR = $opensslDir.FullName
          $env:OPENSSL_INCLUDE_DIR = "$($opensslDir.FullName)\include"
          $env:OPENSSL_LIB_DIR = (Get-ChildItem -Path conan -Recurse -Filter "libssl.lib" | Select-Object -First 1).DirectoryName
          echo "OPENSSL_DIR=$env:OPENSSL_DIR"
          echo "OPENSSL_INCLUDE_DIR=$env:OPENSSL_INCLUDE_DIR"
          echo "OPENSSL_LIB_DIR=$env:OPENSSL_LIB_DIR"
          cargo build --release

      - name: Package
        shell: pwsh
        run: |
          mkdir dist
          Copy-Item target\release\bangumi-proxy.exe dist\
          Copy-Item ca.pem, ca-key.pem dist\
          $binDir = Get-ChildItem -Path conan -Recurse -Filter "libssl*.dll" | Select-Object -First 1 -ExpandProperty DirectoryName
          if ($binDir) { Copy-Item "$binDir\*.dll" dist\ }
          Compress-Archive -Path dist\* -DestinationPath "bangumi-proxy-${env:GITHUB_REF_NAME}-windows-x86_64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: bangumi-proxy-*-windows-x86_64.zip

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
